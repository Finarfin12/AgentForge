services:
  # -----------------------------------------------------
  # PostgreSQL with pgvector for Vector Search & DB
  # -----------------------------------------------------
  postgres:
    image: pgvector/pgvector:pg17
    container_name: agentforge_postgres
    restart: always
    environment:
      POSTGRES_DB: agentforge
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
    ports:
      - "5433:5432"
    volumes:
      - agentforge_postgres_data:/var/lib/postgresql/data
      - ./scripts/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------
  # Redis for Cache, PubSub, and BullMQ
  # -----------------------------------------------------
  redis:
    image: redis:7.4-alpine
    container_name: agentforge_redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - agentforge_redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------
  # Meilisearch for Full-Text Search
  # -----------------------------------------------------
  meilisearch:
    image: getmeili/meilisearch:v1.12
    container_name: agentforge_meilisearch
    restart: always
    environment:
      - MEILI_MASTER_KEY=master_key_for_local_dev_only
      - MEILI_NO_ANALYTICS=true
    ports:
      - "7700:7700"
    volumes:
      - agentforge_meilisearch_data:/meili_data
    healthcheck:
      test: ["CMD", "wget", "--no-verbose", "--spider", "http://localhost:7700/health"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------
  # MinIO for Local S3-Compatible Storage
  # -----------------------------------------------------
  minio:
    image: minio/minio:latest
    container_name: agentforge_minio
    restart: always
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    command: server /data --console-address ":9001"
    ports:
      - "9000:9000"
      - "9001:9001"
    volumes:
      - agentforge_minio_data:/data
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/minio/health/live"]
      interval: 10s
      timeout: 5s
      retries: 5

  # -----------------------------------------------------
  # Nginx API Gateway / Reverse Proxy
  # Routes: /api → backend:3001, / → frontend:3000
  # Backend & Frontend run on host, not in Docker
  # -----------------------------------------------------
  nginx:
    image: nginx:alpine
    container_name: agentforge_nginx
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy

volumes:
  agentforge_postgres_data:
  agentforge_redis_data:
  agentforge_meilisearch_data:
  agentforge_minio_data:
